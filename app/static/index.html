<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Reporthub</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="static/icons/flet.png">
  <link rel="stylesheet" href="static/styles.css">

</head>

<body>

  <div class="top-bg"></div>

  <div class="app">
    <div class="main-row">

      <!-- LEFT -->
      <div class="left-panel">
        <div class="top-bar">
          <div class="logo">
            <span>Report</span><span>hub</span>
          </div>

          <div class="segmented">
            <div id="segmented-slider" class="selection-slider"></div>
            <button class="active">Daily</button>
            <button>2-Weekly</button>
            <button>Common</button>
          </div>

          <button class="search-btn"><span class="icon search-icon"></span>Search History</button>
        </div>

        <div id="whiteboard" class="whiteboard">
          <h3 class="whiteboard-header">
            <div id="header-standard" class="header-content-wrapper"
              style="display: flex; width: 100%; justify-content: space-between; align-items: center;">
              <div class="header-left">
                <span class="icon report-icon"></span>
                <span id="header-title"></span>
              </div>
              <div class="header-buttons">
                <button id="btn-import" class="icon-button">
                  <span class="icon import-icon"></span>
                  Import
                </button>
                <button id="btn-export" class="icon-button">
                  <span class="icon export-icon"></span>
                  Export
                </button>
                <button id="btn-send" class="icon-button">
                  <span class="icon send-icon"></span>
                  Copy-Paste to Real Report
                </button>
                <button id="btn-attach" class="icon-button">
                  <span class="icon attach-icon"></span>
                  Attach Images
                </button>
                <button id="btn-save" class="icon-button">
                  <span class="icon save-icon"></span>
                  Save
                </button>
              </div>
            </div>

            <div id="header-search" class="header-content-wrapper"
              style="display: none; width: 100%; align-items: center; gap: 12px;">
              <span class="icon search2-icon"></span>
              <input type="text" id="history-search-input" placeholder="Search reports."
                style="flex: 1; border: none; outline: none; background: transparent; font-size: 16px;">
            </div>
          </h3>

          <div class="whiteboard-content" contenteditable="true" id="editor">
            <div id="li-highlighter" class="li-highlighter"></div>
          </div>
        </div>
      </div>

      <!-- RIGHT -->
      <div class="right-panel">
        <div class="account-container">
          <div class="right-header" id="account-header">
            <div class="dept-info">
              <span class="dept-label">DEPARTMENT</span>
              <span class="dept-name"></span>
            </div>
            <span class="icon settings-icon">settings</span>
          </div>

          <div id="logout-menu" class="dropdown-menu">
            <button id="btn-logout">
              <span class="icon logout-icon"></span>
              Logout
            </button>
          </div>
        </div>

        <div class="widget calendar">
          <div class="cal-header">
            <button id="prevMonth">◀</button>
            <span id="monthYear"></span>
            <button id="nextMonth">▶</button>
          </div>
          <div class="cal-weekdays">
            <span>S</span><span>M</span><span>T</span><span>W</span><span>T</span><span>F</span><span>S</span>
          </div>
          <div id="calendarGrid" class="cal-grid"></div>
        </div>

        <div class="widget image-bucket">
          <div class="image-bucket-header">
            <span class="icon image-bucket-icon"></span>
            <span>Image Bucket</span>
        </div>
          <div class="image-bucket-content">
            <div id="qrcode-canvas">
              <div id="qrcode-canvas" style="padding: 10px; background: white; border-radius: 4px;"></div>
            </div>
          </div>
          <div class="image-bucket-footer">
            Scan to upload or attach your job related images
          </div>
        </div>
        <div class="widget image-stream" id="streamContainer">
          <img id="image-1" class="stream-img active" src="" alt="Stream 1">
          <img id="image-2" class="stream-img" src="" alt="Stream 2">
        </div>
      </div>

    </div>
  </div>

  <div id="custom-context-menu"
    style="display: none; position: absolute; z-index: 10000; background: white; border: 1px solid #ccc; box-shadow: 2px 2px 5px rgba(0,0,0,0.2); border-radius: 4px; padding: 5px 0; min-width: 180px;">
    <div id="attach-image-item"
      style="padding: 8px 15px; cursor: pointer; font-size: 14px; transition: background 0.2s;">
      Attach Image from Bucket
    </div>
  </div>

  <div id="snackbar">Report Saved!</div>

  <div id="gallery-modal">
    <div class="gallery-container">
      <header class="gallery-header">
        <h3>Image Bucket Explorer</h3>
        <button class="close-btn">&times;</button>
      </header>

      <div class="gallery-body">
        <aside class="gallery-sidebar">
          <div class="sidebar-label">Report Periods</div>
          <div id="folder-list">
          </div>
        </aside>

        <main class="gallery-content">
          <div id="image-grid" class="image-grid">
          </div>
        </main>
      </div>

      <footer class="gallery-footer">
        <div id="selection-status" style="font-weight: 600; color: #64748b;">0 images selected</div>
        <div class="footer-actions">
          <button class="btn-base btn-copy">Copy Images</button>
          <button class="btn-base btn-delete">Permanent Delete</button>
          <button class="btn-base btn-attach">Attach to Active Report</button>
        </div>
      </footer>
    </div>
  </div>

  <div id="loading-overlay" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 9999; flex-direction: column; align-items: center; justify-content: center; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;">
    
    <div class="loader"></div>
    
      <div style="color: white; margin-top: 25px; font-size: 1.2rem; text-align: center; font-weight: 300; letter-spacing: 1px;">
          Generating 2 Weekly Report Document.<br>
          <span style="color: #ff4757; font-weight: bold; font-size: 0.9rem;">Please wait while we process you document. Ta bom?.</span>
      </div>
  </div>

  <input type="file" id="file-picker" style="display:none">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/uuid/8.3.2/uuidv4.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode_js@1.0.0/qrcode.min.js"></script>
  <script type="module" src="/static/scripts/main.js"></script>

</body>

</html>
